# MindPulse Analyzer — static Vite build. No Netlify environment variables required.
# Monorepo: set Site settings → Build & deploy → Base directory to this folder
# (e.g. AdminPortal/mindpulse-analyzer), or deploy from a repo that only contains this app.

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
